{% extends "base.html" %} {% block title %}Login • CHECK8{% endblock %} {% block content %}
<div class="card">

    <h1 class="h1">Login</h1>
    <p class="muted">Enter your institutional email and password.</p>

    <form method="post" class="form">
        <label class="label" for="email">Institutional Email</label>
        <div style="position: relative;">
          <input id="email" name="email" type="text" class="input" placeholder="e.g. 20xxxxxxx" required style="padding-right: 220px;" />
          <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #666; font-size: 14px;">@gordoncollege.edu.ph</span>
        </div>

        <label class="label" for="password">Password</label>
        <input id="password" name="password" type="password" class="input" autocomplete="current-password" required />

        <button class="btn" type="submit">Login</button>
        <a class="btn btn--ghost" href="{{ url_for('auth.signup') }}" style="margin-top: 8px; text-align: center; display: block;">
        Sign up
      </a>
    </form>
    <script>
      document.querySelector('form').addEventListener('submit', function(e) {
        let emailField = document.getElementById('email');
        if (emailField.value && !emailField.value.includes('@')) {
          emailField.value = emailField.value + '@gordoncollege.edu.ph';
        }
      });
    </script>

</div>
{% endblock %}
