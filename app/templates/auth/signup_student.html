{% extends "base.html" %}
{% block title %}Student Sign up • CHECK8{% endblock %}

{% block content %}
  <div class="card">
    <button type="button" class="btn btn--ghost" onclick="window.history.back()" style="margin-bottom: 12px;">
      ← Back
    </button>
    <h1 class="h1">Student Sign up</h1>
    <p class="muted">Create a student account to access your clearance dashboard.</p>

    <form method="post" class="form">
      <label class="label" for="student_number">Student Number</label>
      <input
        id="student_number"
        name="student_number"
        class="input"
        placeholder="e.g. 2022-0003"
        value="{{ student_number or '' }}"
        required
      />

      <label class="label" for="full_name">Full name</label>
      <input
        id="full_name"
        name="full_name"
        class="input"
        placeholder="e.g. Juan Dela Cruz"
        value="{{ full_name or '' }}"
        required
      />

      <label class="label" for="department">Department</label>
      <select id="department" name="department" class="input" required>
        <option value="">Select Department</option>
        <option value="College of Computer Studies" {% if department == "College of Computer Studies" %}selected{% endif %}>College of Computer Studies</option>
        <option value="College of Engineering" {% if department == "College of Engineering" %}selected{% endif %}>College of Engineering</option>
        <option value="College of Business Administration" {% if department == "College of Business Administration" %}selected{% endif %}>College of Business Administration</option>
        <option value="College of Arts and Sciences" {% if department == "College of Arts and Sciences" %}selected{% endif %}>College of Arts and Sciences</option>
        <option value="College of Education" {% if department == "College of Education" %}selected{% endif %}>College of Education</option>
        <option value="College of Nursing" {% if department == "College of Nursing" %}selected{% endif %}>College of Nursing</option>
        <option value="College of Law" {% if department == "College of Law" %}selected{% endif %}>College of Law</option>
        <option value="College of Medicine" {% if department == "College of Medicine" %}selected{% endif %}>College of Medicine</option>
      </select>

      <label class="label" for="program">Program</label>
      <select id="program" name="program" class="input" required>
        <option value="">Select Program</option>
        <option value="Bachelor of Science in Computer Science" {% if program == "Bachelor of Science in Computer Science" %}selected{% endif %}>Bachelor of Science in Computer Science</option>
        <option value="Bachelor of Science in Information Technology" {% if program == "Bachelor of Science in Information Technology" %}selected{% endif %}>Bachelor of Science in Information Technology</option>
        <option value="Bachelor of Science in Software Engineering" {% if program == "Bachelor of Science in Software Engineering" %}selected{% endif %}>Bachelor of Science in Software Engineering</option>
        <option value="Bachelor of Science in Civil Engineering" {% if program == "Bachelor of Science in Civil Engineering" %}selected{% endif %}>Bachelor of Science in Civil Engineering</option>
        <option value="Bachelor of Science in Mechanical Engineering" {% if program == "Bachelor of Science in Mechanical Engineering" %}selected{% endif %}>Bachelor of Science in Mechanical Engineering</option>
        <option value="Bachelor of Science in Electrical Engineering" {% if program == "Bachelor of Science in Electrical Engineering" %}selected{% endif %}>Bachelor of Science in Electrical Engineering</option>
        <option value="Bachelor of Science in Business Administration" {% if program == "Bachelor of Science in Business Administration" %}selected{% endif %}>Bachelor of Science in Business Administration</option>
        <option value="Bachelor of Science in Accountancy" {% if program == "Bachelor of Science in Accountancy" %}selected{% endif %}>Bachelor of Science in Accountancy</option>
        <option value="Bachelor of Arts in Communication" {% if program == "Bachelor of Arts in Communication" %}selected{% endif %}>Bachelor of Arts in Communication</option>
        <option value="Bachelor of Arts in Psychology" {% if program == "Bachelor of Arts in Psychology" %}selected{% endif %}>Bachelor of Arts in Psychology</option>
        <option value="Bachelor of Elementary Education" {% if program == "Bachelor of Elementary Education" %}selected{% endif %}>Bachelor of Elementary Education</option>
        <option value="Bachelor of Secondary Education" {% if program == "Bachelor of Secondary Education" %}selected{% endif %}>Bachelor of Secondary Education</option>
        <option value="Bachelor of Science in Nursing" {% if program == "Bachelor of Science in Nursing" %}selected{% endif %}>Bachelor of Science in Nursing</option>
        <option value="Juris Doctor" {% if program == "Juris Doctor" %}selected{% endif %}>Juris Doctor</option>
        <option value="Doctor of Medicine" {% if program == "Doctor of Medicine" %}selected{% endif %}>Doctor of Medicine</option>
      </select>

      <label class="label" for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        class="input"
        autocomplete="new-password"
        required
      />

      <label class="label" for="confirm_password">Confirm password</label>
      <input
        id="confirm_password"
        name="confirm_password"
        type="password"
        class="input"
        autocomplete="new-password"
        required
      />

      <button class="btn" type="submit">Create student account</button>
    </form>

    <div class="divider"></div>

    <div class="muted small">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Back to login</a>.
    </div>
  </div>
{% endblock %}
