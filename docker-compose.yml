version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-dev-change-me}
      DATABASE_URL: postgresql://check8_user:${DB_PASSWORD:-default}@db:5432/check8_db
    depends_on:
      - db
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: check8_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-default}
      POSTGRES_DB: check8_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U check8_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
